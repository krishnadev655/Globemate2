<!-- ============ SAVED PLACES ============ -->
<section class="section section-alt tab-section" id="saved-places">
  <div class="container">
    <div class="section-header">
      <span class="section-badge"><i class="fas fa-heart"></i> Saved Places</span>
      <h2 class="section-title">Your Saved Destinations</h2>
      <p class="section-desc">Access your saved trips and destinations for quick reference.</p>
    </div>

    <div id="savedPlacesContainer" class="saved-places-grid">
      <!-- Saved places will be populated here -->
      <div class="empty-state">
        <i class="fas fa-bookmark"></i>
        <h3>No Saved Places Yet</h3>
        <p>Start planning a trip and save your itineraries to see them here.</p>
        <button class="btn btn-primary" data-tab="country-info" style="margin-top:16px;">
          <i class="fas fa-plane"></i> Plan a Trip
        </button>
      </div>
    </div>
  </div>
</section>

<style>
  .saved-places-grid {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 300px;
    margin-top: 32px;
  }

  .saved-places-grid.saved-places-grid-has-items {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 28px;
    min-height: 0;
  }

  @media (max-width: 1100px) {
    .saved-places-grid.saved-places-grid-has-items {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 760px) {
    .saved-places-grid.saved-places-grid-has-items {
      grid-template-columns: 1fr;
      gap: 18px;
    }
  }

  .saved-places-grid .empty-state {
    width: 100%;
    max-width: 420px;
    margin: 0 auto;
  }

  .saved-place-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 5px 14px rgba(15,23,42,.08);
    transition: all .3s ease;
    cursor: pointer;
  }

  .saved-place-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,.12);
    border-color: #7c3aed;
  }

  .saved-place-header {
    position: relative;
    color: #fff;
    min-height: 128px;
    padding: 18px;
    display: flex;
    align-items: flex-end;
    gap: 12px;
    background-size: cover;
    background-position: center;
    isolation: isolate;
  }

  .saved-place-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(15,23,42,.22), rgba(15,23,42,.72));
    z-index: -1;
  }

  .saved-place-header-content {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
  }

  .saved-place-icon {
    font-size: 1.8rem;
    text-shadow: 0 2px 8px rgba(0,0,0,.35);
  }

  .saved-place-content {
    padding: 22px;
  }

  .saved-place-destination {
    font-size: 1.45rem;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 0;
    text-shadow: 0 2px 8px rgba(0,0,0,.3);
  }

  .saved-place-code {
    display: inline-block;
    margin-top: 4px;
    font-size: .72rem;
    color: rgba(255,255,255,.94);
    background: rgba(15,23,42,.35);
    border: 1px solid rgba(255,255,255,.28);
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: .02em;
  }

  .saved-place-details {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
    font-size: .9rem;
    color: #64748b;
  }

  .saved-place-detail-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .saved-place-detail-item i {
    color: #7c3aed;
    width: 16px;
  }

  .saved-place-date {
    font-size: .85rem;
    color: #94a3b8;
    margin-bottom: 16px;
  }

  .saved-place-actions {
    display: flex;
    gap: 8px;
  }

  .saved-place-btn {
    flex: 1;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    background: #f8fafc;
    color: #64748b;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }

  .saved-place-btn:hover {
    border-color: #7c3aed;
    color: #7c3aed;
    background: rgba(124,58,237,.05);
  }

  .saved-place-btn.primary {
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    color: #fff;
    border-color: transparent;
  }

  .saved-place-btn.primary:hover {
    opacity: .88;
  }
</style>

<script>
  window.SavedPlaces = {
    onStoreUpdated: null,

    init() {
      if (typeof GlobeMateStore !== 'undefined' && typeof GlobeMateStore.syncFromCloud === 'function') {
        GlobeMateStore.syncFromCloud().catch((error) => {
          console.warn('Saved places cloud sync failed:', error);
        });
      }

      if (this.onStoreUpdated) {
        window.removeEventListener('globemate:saved-places-updated', this.onStoreUpdated);
      }

      this.onStoreUpdated = () => this.renderSavedPlaces();
      window.addEventListener('globemate:saved-places-updated', this.onStoreUpdated);
      this.renderSavedPlaces();
    },

    getSavedEntries() {
      if (typeof GlobeMateStore !== 'undefined') {
        return GlobeMateStore.getSavedPlaces().map((place) => ({
          id: place.id,
          sourceTripId: place.sourceTripId,
          destination: place.destination || place.trip?.destination || 'Unknown destination',
          date: place.updatedAt || place.createdAt,
          duration: place.itinerary?.prefs?.duration || null,
          travelers: place.itinerary?.prefs?.travelers || place.trip?.passengers || 1,
          purpose: place.itinerary?.prefs?.purpose || 'Trip Plan',
          hasItinerary: Boolean(place.itinerary?.html),
          itinerary: place.itinerary || null,
          trip: place.trip || null
        }));
      }

      const itineraries = JSON.parse(localStorage.getItem('globemate_saved_itineraries') || '[]').map((item, index) => ({
        id: item.id || `itin-${index}`,
        sourceTripId: item.trip?.id || item.id || index,
        destination: item.destination || 'Unknown destination',
        date: item.date,
        duration: item.prefs?.duration,
        travelers: item.prefs?.travelers,
        purpose: item.prefs?.purpose,
        hasItinerary: Boolean(item.html),
        itinerary: item,
        trip: item.trip || null
      }));

      return itineraries.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
    },

    formatDate(dateVal) {
      const date = new Date(dateVal);
      if (Number.isNaN(date.getTime())) return 'Recently';
      return date.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' });
    },

    escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    },

    getCountryCode(item) {
      const directCode = item?.trip?.destinationData?.cca3 || item?.trip?.cca3 || item?.itinerary?.trip?.destinationData?.cca3;
      if (directCode) return String(directCode).toUpperCase();

      const name = (item?.destination || '').toLowerCase().trim();
      const map = {
        germany: 'DEU',
        'united arab emirates': 'ARE',
        denmark: 'DNK',
        france: 'FRA',
        india: 'IND',
        japan: 'JPN',
        'united states': 'USA',
        usa: 'USA',
        canada: 'CAN',
        australia: 'AUS',
        singapore: 'SGP',
        thailand: 'THA'
      };

      return map[name] || '';
    },

    getCountryBannerImage(item) {
      const code = this.getCountryCode(item);
      const banners = {
        FRA: 'https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=1200&h=420&fit=crop',
        DEU: 'https://images.unsplash.com/photo-1467269204594-9661b134dd2b?w=1200&h=420&fit=crop',
        ARE: 'https://images.unsplash.com/photo-1512453979798-5ea266f8880c?w=1200&h=420&fit=crop',
        DNK: 'https://images.unsplash.com/photo-1513622470522-26c3c8a854bc?w=1200&h=420&fit=crop',
        IND: 'https://images.unsplash.com/photo-1564507592333-c60657eea523?w=1200&h=420&fit=crop',
        JPN: 'https://images.unsplash.com/photo-1542640244-7e672d6cef4e?w=1200&h=420&fit=crop',
        USA: 'https://images.unsplash.com/photo-1485738422979-f5c462d49f74?w=1200&h=420&fit=crop',
        CAN: 'https://images.unsplash.com/photo-1503614472-8c93d56e92ce?w=1200&h=420&fit=crop',
        AUS: 'https://images.unsplash.com/photo-1523059623039-a9ed027e7fad?w=1200&h=420&fit=crop',
        SGP: 'https://images.unsplash.com/photo-1525625293386-3f8f99389edd?w=1200&h=420&fit=crop',
        THA: 'https://images.unsplash.com/photo-1563492065599-3520f775eeed?w=1200&h=420&fit=crop'
      };

      if (code && banners[code]) return banners[code];
      const destination = encodeURIComponent(item?.destination || 'travel destination');
      return `https://source.unsplash.com/1200x420/?${destination},city,landmark`;
    },

    renderSavedPlaces() {
      const saved = this.getSavedEntries();
      const container = document.getElementById('savedPlacesContainer');
      
      if (!container) return;

      if (saved.length === 0) {
        container.classList.remove('saved-places-grid-has-items');
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-bookmark"></i>
            <h3>No Saved Places Yet</h3>
            <p>Start planning a trip and save your itineraries to see them here.</p>
            <button class="btn btn-primary" data-tab="country-info" style="margin-top:16px;">
              <i class="fas fa-plane"></i> Plan a Trip
            </button>
          </div>
        `;
        return;
      }

      container.classList.add('saved-places-grid-has-items');

      container.innerHTML = saved.map((item, idx) => {
        const dateStr = this.formatDate(item.date);
        const duration = item.duration || '—';
        const travelers = item.travelers || 1;
        const purpose = item.purpose || 'Travel';
        const destination = this.escapeHtml(item.destination);
        const hasItinerary = item.hasItinerary;
        const countryCode = this.getCountryCode(item);
        const bannerImage = this.getCountryBannerImage(item);

        return `
          <div class="saved-place-card">
            <div class="saved-place-header" style="background-image:url('${bannerImage}')">
              <div class="saved-place-header-content">
                <div class="saved-place-icon">🌍</div>
                <div>
                  <div class="saved-place-destination">${destination}</div>
                  ${countryCode ? `<span class="saved-place-code">${countryCode}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="saved-place-content">
              <div class="saved-place-details">
                <div class="saved-place-detail-item">
                  <i class="fas fa-calendar-alt"></i>
                  <span>${duration === '—' ? 'Duration not set' : `${duration} Days`}</span>
                </div>
                <div class="saved-place-detail-item">
                  <i class="fas fa-users"></i>
                  <span>${travelers} Traveler${travelers > 1 ? 's' : ''}</span>
                </div>
                <div class="saved-place-detail-item">
                  <i class="fas fa-${hasItinerary ? 'route' : 'compass'}"></i>
                  <span>${hasItinerary ? this.escapeHtml(purpose) : 'Saved destination'}</span>
                </div>
              </div>
              <div class="saved-place-date">Saved on ${dateStr}</div>
              <div class="saved-place-actions">
                <button class="saved-place-btn primary" onclick="SavedPlaces.openSavedItem(${idx})">
                  <i class="fas fa-eye"></i> ${hasItinerary ? 'View Itinerary' : 'Open Trip'}
                </button>
                <button class="saved-place-btn" onclick="SavedPlaces.deleteSavedItem(${idx})">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    },

    openSavedItem(idx) {
      const saved = this.getSavedEntries();
      const item = saved[idx];
      if (!item) return;
      
      if (item.hasItinerary && item.itinerary) {
        if (typeof GlobeMateStore !== 'undefined') GlobeMateStore.setViewedItinerary(item.itinerary);
        else localStorage.setItem('globemate_view_itinerary', JSON.stringify(item.itinerary));
        if (typeof PageLoader !== 'undefined') {
          PageLoader.loadPage('trip-ai-planner');
        }
        return;
      }

      if (item.trip?.id || item.sourceTripId) {
        const tripId = item.trip?.id || item.sourceTripId;
        if (typeof GlobeMateStore !== 'undefined') GlobeMateStore.setCurrentTripId(tripId);
        else localStorage.setItem('globemate_ai_trip_id', String(tripId));
        if (typeof PageLoader !== 'undefined') {
          PageLoader.loadPage('trip-ai-planner');
        }
      }
    },

    deleteSavedItem(idx) {
      const saved = this.getSavedEntries();
      const item = saved[idx];
      if (!item) return;

      const message = item.hasItinerary
        ? 'Are you sure you want to delete this saved itinerary?'
        : 'Are you sure you want to delete this saved destination?';

      if (!confirm(message)) return;

      if (typeof GlobeMateStore !== 'undefined') {
        GlobeMateStore.deleteSavedPlace(item.id);
      } else {
        const legacy = JSON.parse(localStorage.getItem('globemate_saved_itineraries') || '[]');
        const next = legacy.filter(entry => Number(entry.id) !== Number(item.id));
        localStorage.setItem('globemate_saved_itineraries', JSON.stringify(next));
      }

      this.renderSavedPlaces();
    },

    cleanup() {
      if (this.onStoreUpdated) {
        window.removeEventListener('globemate:saved-places-updated', this.onStoreUpdated);
      }
      this.onStoreUpdated = null;
    }
  };

  if (typeof PageLoader !== 'undefined') {
    PageLoader.registerModule('saved-places', window.SavedPlaces);
  }
</script>
