<!-- ============ SAVED PLACES ============ -->
<section class="section section-alt tab-section" id="saved-places">
  <div class="container">
    <div class="section-header">
      <span class="section-badge"><i class="fas fa-heart"></i> Saved Places</span>
      <h2 class="section-title">Your Saved Destinations</h2>
      <p class="section-desc">Access your saved trips and destinations for quick reference.</p>
    </div>

    <div id="savedPlacesContainer" class="saved-places-grid">
      <!-- Saved places will be populated here -->
      <div class="empty-state">
        <i class="fas fa-bookmark"></i>
        <h3>No Saved Places Yet</h3>
        <p>Start planning a trip and save your itineraries to see them here.</p>
        <button class="btn btn-primary" data-tab="trip-ai-planner" style="margin-top:16px;">
          <i class="fas fa-plane"></i> Plan a Trip
        </button>
      </div>
    </div>
  </div>
</section>

<style>
  .saved-places-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-top: 32px;
  }

  .saved-place-card {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    transition: all .3s ease;
    cursor: pointer;
  }

  .saved-place-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 20px rgba(0,0,0,.12);
    border-color: #7c3aed;
  }

  .saved-place-header {
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    color: #fff;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .saved-place-icon {
    font-size: 1.8rem;
  }

  .saved-place-content {
    padding: 20px;
  }

  .saved-place-destination {
    font-size: 1.1rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 8px;
  }

  .saved-place-details {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
    font-size: .9rem;
    color: #64748b;
  }

  .saved-place-detail-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .saved-place-detail-item i {
    color: #7c3aed;
    width: 16px;
  }

  .saved-place-date {
    font-size: .85rem;
    color: #94a3b8;
    margin-bottom: 16px;
  }

  .saved-place-actions {
    display: flex;
    gap: 8px;
  }

  .saved-place-btn {
    flex: 1;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    background: #f8fafc;
    color: #64748b;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }

  .saved-place-btn:hover {
    border-color: #7c3aed;
    color: #7c3aed;
    background: rgba(124,58,237,.05);
  }

  .saved-place-btn.primary {
    background: linear-gradient(135deg, #7c3aed, #3b82f6);
    color: #fff;
    border-color: transparent;
  }

  .saved-place-btn.primary:hover {
    opacity: .88;
  }
</style>

<script>
  const SavedPlaces = {
    init() {
      this.renderSavedPlaces();
    },

    renderSavedPlaces() {
      const saved = JSON.parse(localStorage.getItem('globemate_saved_itineraries') || '[]');
      const container = document.getElementById('savedPlacesContainer');
      
      if (!container) return;

      if (saved.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-bookmark"></i>
            <h3>No Saved Places Yet</h3>
            <p>Start planning a trip and save your itineraries to see them here.</p>
            <button class="btn btn-primary" data-tab="trip-ai-planner" style="margin-top:16px;">
              <i class="fas fa-plane"></i> Plan a Trip
            </button>
          </div>
        `;
        return;
      }

      container.innerHTML = saved.map((item, idx) => {
        const date = new Date(item.date);
        const dateStr = date.toLocaleDateString('en-IN', { month: 'short', day: 'numeric', year: 'numeric' });
        const duration = item.prefs?.duration || '—';
        const travelers = item.prefs?.travelers || 1;
        const purpose = item.prefs?.purpose || 'Travel';

        return `
          <div class="saved-place-card">
            <div class="saved-place-header">
              <div class="saved-place-icon">🌍</div>
              <div>
                <div class="saved-place-destination">${item.destination}</div>
              </div>
            </div>
            <div class="saved-place-content">
              <div class="saved-place-details">
                <div class="saved-place-detail-item">
                  <i class="fas fa-calendar-alt"></i>
                  <span>${duration} Days</span>
                </div>
                <div class="saved-place-detail-item">
                  <i class="fas fa-users"></i>
                  <span>${travelers} Traveler${travelers > 1 ? 's' : ''}</span>
                </div>
                <div class="saved-place-detail-item">
                  <i class="fas fa-compass"></i>
                  <span>${purpose}</span>
                </div>
              </div>
              <div class="saved-place-date">Saved on ${dateStr}</div>
              <div class="saved-place-actions">
                <button class="saved-place-btn primary" onclick="SavedPlaces.viewItinerary(${idx})">
                  <i class="fas fa-eye"></i> View
                </button>
                <button class="saved-place-btn" onclick="SavedPlaces.deleteItinerary(${idx})">
                  <i class="fas fa-trash"></i> Delete
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');

      // Delegate click events for data-tab buttons
      document.querySelectorAll('[data-tab]').forEach(el => {
        if (!el.hasListener) {
          el.addEventListener('click', (e) => {
            e.preventDefault();
            if (typeof PageLoader !== 'undefined') {
              PageLoader.loadPage(el.getAttribute('data-tab'));
            }
          });
          el.hasListener = true;
        }
      });
    },

    viewItinerary(idx) {
      const saved = JSON.parse(localStorage.getItem('globemate_saved_itineraries') || '[]');
      const itinerary = saved[idx];
      
      if (itinerary) {
        // Store current itinerary for viewing
        localStorage.setItem('globemate_view_itinerary', JSON.stringify(itinerary));
        // Navigate to trip planner to show the itinerary
        if (typeof PageLoader !== 'undefined') {
          PageLoader.loadPage('trip-ai-planner');
        }
      }
    },

    deleteItinerary(idx) {
      if (confirm('Are you sure you want to delete this saved itinerary?')) {
        const saved = JSON.parse(localStorage.getItem('globemate_saved_itineraries') || '[]');
        saved.splice(idx, 1);
        localStorage.setItem('globemate_saved_itineraries', JSON.stringify(saved));
        this.renderSavedPlaces();
      }
    }
  };

  if (typeof PageLoader !== 'undefined') {
    PageLoader.registerModule('saved-places', SavedPlaces);
  }
</script>
